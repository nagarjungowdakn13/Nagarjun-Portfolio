<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Soft glow blobs -->
  <circle cx="1050" cy="120" r="220" fill="#a855f7" opacity="0.18"/>
  <circle cx="120" cy="540" r="200" fill="#f97316" opacity="0.15"/>

  <!-- Status pill -->
  <g transform="translate(80, 90)">
    <rect width="280" height="40" rx="20" fill="rgba(16, 185, 129, 0.12)" stroke="rgba(16, 185, 129, 0.4)"/>
    <circle cx="22" cy="20" r="5" fill="#10b981"/>
    <text x="40" y="26" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="500" fill="#6ee7b7">Open to opportunities</text>
  </g>

  <!-- Terminal label -->
  <text x="80" y="180" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="16" fill="#94a3b8">~/nagarjun $ whoami</text>

  <!-- Name -->
  <text x="80" y="280" font-family="ui-sans-serif, system-ui, sans-serif" font-size="80" font-weight="700" fill="white" letter-spacing="-2">Nagarjun</text>
  <text x="80" y="370" font-family="ui-sans-serif, system-ui, sans-serif" font-size="80" font-weight="700" fill="url(#grad)" letter-spacing="-2">Gowda K N</text>

  <!-- Roles -->
  <text x="80" y="440" font-family="ui-sans-serif, system-ui, sans-serif" font-size="32" font-weight="300" fill="#cbd5e1">AI/ML · Backend · Security Engineer</text>

  <!-- Tagline -->
  <text x="80" y="490" font-family="ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="400" fill="#94a3b8">RAG pipelines · LLM evaluation · Real-time anomaly detection</text>

  <!-- Bottom strip with tags -->
  <g transform="translate(80, 545)">
    <g transform="translate(0, 0)">
      <rect width="120" height="36" rx="8" fill="rgba(168, 85, 247, 0.15)" stroke="rgba(168, 85, 247, 0.3)"/>
      <text x="60" y="23" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#d8b4fe">Python</text>
    </g>
    <g transform="translate(132, 0)">
      <rect width="120" height="36" rx="8" fill="rgba(168, 85, 247, 0.15)" stroke="rgba(168, 85, 247, 0.3)"/>
      <text x="60" y="23" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#d8b4fe">FastAPI</text>
    </g>
    <g transform="translate(264, 0)">
      <rect width="120" height="36" rx="8" fill="rgba(168, 85, 247, 0.15)" stroke="rgba(168, 85, 247, 0.3)"/>
      <text x="60" y="23" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#d8b4fe">FAISS</text>
    </g>
    <g transform="translate(396, 0)">
      <rect width="120" height="36" rx="8" fill="rgba(168, 85, 247, 0.15)" stroke="rgba(168, 85, 247, 0.3)"/>
      <text x="60" y="23" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#d8b4fe">PyTorch</text>
    </g>
    <g transform="translate(528, 0)">
      <rect width="120" height="36" rx="8" fill="rgba(168, 85, 247, 0.15)" stroke="rgba(168, 85, 247, 0.3)"/>
      <text x="60" y="23" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#d8b4fe">Docker</text>
    </g>
  </g>

  <!-- NG monogram top-right -->
  <g transform="translate(1020, 80)">
    <rect width="100" height="100" rx="22" fill="url(#grad)"/>
    <text x="50" y="68" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="44" font-weight="800" fill="white" letter-spacing="-1">NG</text>
  </g>
</svg>
